<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFC107" />

    <title>Chatori Jeeb — India's Fastest Food Delivery Platform</title>
    <meta name="description" content="Order food, earn by delivering, or grow your restaurant with Chatori Jeeb. Fast delivery, real-time tracking, and the best earnings platform across 50+ Indian cities." />
    <meta name="keywords" content="food delivery app, online food order, delivery partner jobs, restaurant platform India, Chatori Jeeb, fast food delivery, Swiggy alternative, Zomato alternative" />
    <meta name="author" content="Chatori Jeeb" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://chatorijeeb.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="Chatori Jeeb — Food Delivery Made Easy" />
    <meta property="og:description" content="Craving something delicious? Order now with Chatori Jeeb. India's vibrant food delivery platform for foodies, riders, and restaurants." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://chatorijeeb.com/" />
    <meta property="og:site_name" content="Chatori Jeeb" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chatori Jeeb — Food Delivery Made Easy" />
    <meta name="twitter:description" content="Order food, earn by delivering, or grow your restaurant with Chatori Jeeb." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Preconnect for fonts/assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Chatori Jeeb",
        "url": "https://chatorijeeb.com",
        "logo": "https://chatorijeeb.com/og-image.jpg",
        "description": "India's vibrant food delivery platform for users, delivery partners, and restaurants.",
        "sameAs": [
          "https://twitter.com/chatorijeeb",
          "https://instagram.com/chatorijeeb",
          "https://facebook.com/chatorijeeb"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "areaServed": "IN",
          "availableLanguage": ["English", "Hindi"]
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Chatori Jeeb",
        "url": "https://chatorijeeb.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://chatorijeeb.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
